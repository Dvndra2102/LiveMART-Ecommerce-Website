{% extends "auth_base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} | LocalMarket{% endblock %}

{% block content %}
<div class="text-center">
  <h1 class="text-2xl font-bold text-gray-900 mb-3">{% trans "Password changed" %}</h1>
  <p class="text-sm text-gray-600 mb-6">{% trans "Your password has been successfully updated." %}</p>
  <a href="/" class="inline-flex items-center px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg">{% trans "Go to Home" %}</a>
  <a href="{% url 'account_login' %}" class="inline-flex items-center px-4 py-2 ml-2 border border-gray-300 text-gray-700 rounded-lg">{% trans "Sign In" %}</a>
  </div>
{% endblock %}
