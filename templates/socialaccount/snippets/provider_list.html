{% load i18n %}
{% load socialaccount %}

{% get_providers as socialaccount_providers %}

{% if socialaccount_providers %}
<div class="mt-6">
    <div class="relative">
        <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500"> Or continue with </span>
        </div>
    </div>

    <div class="mt-6">
        {% for provider in socialaccount_providers %}
            {% if provider.id == 'google' %}
            <a href="{% provider_login_url provider.id process=process scope=scope auth_params=auth_params %}"
               class="w-full flex justify-center items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid" viewBox="0 0 256 262">
                    <path fill="#4285F4" d="M255.878 133.451c0-10.337-0.972-18.262-2.614-26.06h-123.1v46.732h69.254c-2.614 15.011-10.584 27.822-22.956 36.609v30.158h38.832c22.78-20.99 35.92-51.48 35.92-87.44z"></path>
                    <path fill="#34A853" d="M128.002 261.63c34.116 0 63.158-11.31 84.19-30.82l-38.832-30.158c-11.31 7.641-25.8 12.05-45.358 12.05-34.912 0-64.84-23.665-75.466-55.628H14.86v31.026c21.94 43.37 66.02 73.53 113.142 73.53z"></path>
                    <path fill="#FBBC05" d="M52.534 156.983c-2.185-7.641-3.463-15.823-3.463-24.3s1.278-16.659 3.463-24.3V77.357H14.86C5.232 98.16 0 114.71 0 132.683c0 17.973 5.232 34.523 14.86 55.326l37.674-31.026z"></d>
                    <path fill="#EA4335" d="M128.002 52.02c18.746 0 32.748 7.91 40.183 14.86l34.523-33.882C226.257 11.08 181.79 0 128.002 0 80.88 0 36.802 30.16 14.86 73.53l37.674 31.026c10.626-31.963 40.554-52.536 75.468-52.536z"></path>
                </svg>
                <span class="ml-3">Sign in with Google</span>
            </a>
            {% endif %}
        {% endfor %}
    </div>
</div>
{% endif %}
